name: 'Step 2: Publish Release'
on:
  workflow_dispatch:
    inputs:
      pypi_mode:
        description: 'Which consent variant to publish to PyPI (the other is attached as a GitHub release asset)'
        required: false
        default: 'silent'
        type: choice
        options:
          - silent
          - consent
      branch:
        description: 'The target branch'
        required: false
      release_url:
        description: 'The URL of the draft GitHub release'
        required: false
      steps_to_skip:
        description: 'Comma separated list of steps to skip'
        required: false

jobs:
  publish_release:
    runs-on: ubuntu-latest
    env:
      CONSENT_MODE: ${{ github.event.inputs.pypi_mode || 'silent' }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - name: Populate Release
        id: populate-release
        uses: jupyter-server/jupyter_releaser/.github/actions/populate-release@v2
        with:
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          branch: ${{ github.event.inputs.branch }}
          release_url: ${{ github.event.inputs.release_url }}
          steps_to_skip: ${{ github.event.inputs.steps_to_skip }}

      - name: Finalize Release
        id: finalize-release
        uses: jupyter-server/jupyter_releaser/.github/actions/finalize-release@v2
        with:
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          release_url: ${{ steps.populate-release.outputs.release_url }}

      - name: Build alternate consent variant wheel
        run: |
          PYPI_MODE="${{ github.event.inputs.pypi_mode || 'silent' }}"
          ALT_MODE=$([[ "$PYPI_MODE" == "silent" ]] && echo "consent" || echo "silent")
          rm -rf dist/
          CONSENT_MODE=$ALT_MODE python -m build --wheel
          python3 -c "
          import glob, os, re, sys
          alt = sys.argv[1]
          for f in glob.glob('dist/*.whl'):
              new = re.sub(r'(-\d[^-]*)(-py)', fr'\1+{alt}\2', f)
              os.rename(f, new)
          " "$ALT_MODE"

      - name: Upload alternate wheel to GitHub release
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          TAG=$(basename "${{ steps.finalize-release.outputs.release_url }}")
          gh release upload "$TAG" dist/*.whl --repo ${{ github.repository }}

      - name: '** Next Step **'
        if: ${{ success() }}
        run: |
          echo "Verify the final release"
          echo ${{ steps.finalize-release.outputs.release_url }}

      - name: '** Failure Message **'
        if: ${{ failure() }}
        run: |
          echo "Failed to Publish the Draft Release Url:"
          echo ${{ steps.populate-release.outputs.release_url }}
